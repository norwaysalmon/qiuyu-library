<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>祈鸳的图书馆</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="gate-body">
  <div class="gate-container">
    <div class="gate-glow"></div>
    <div class="gate-card">
      <div class="gate-icon">📚</div>
      <h1 class="gate-title">祈鸳的图书馆</h1>
      <p class="gate-subtitle">请输入密码进入</p>
      <form id="gate-form" class="gate-form">
        <div class="gate-input-wrap">
          <input type="password" id="gate-password" placeholder="输入密码..." autocomplete="off" autofocus>
          <button type="button" id="gate-toggle" class="gate-toggle" aria-label="显示密码">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <div id="gate-error" class="gate-error" style="display:none">密码错误，请重试</div>
        <button type="submit" class="gate-btn">
          <span>进入图书馆</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </button>
      </form>
      <p class="gate-footer">🔒 仅限授权访问</p>
    </div>
  </div>
  <script>
    (function() {
      const HASH = '1d34e6f0a50d08c1195ee52646c56e3894eb94b843eee469c644b1d8bd89b9a5';
      const form = document.getElementById('gate-form');
      const input = document.getElementById('gate-password');
      const error = document.getElementById('gate-error');
      const toggle = document.getElementById('gate-toggle');

      toggle.addEventListener('click', () => {
        input.type = input.type === 'password' ? 'text' : 'password';
      });

      async function sha256(str) {
        const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
        return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const hash = await sha256(input.value.trim());
        if (hash === HASH) {
          sessionStorage.setItem('lib_auth', '1');
          sessionStorage.setItem('lib_auth_time', Date.now().toString());
          window.location.href = 'library-v2.html';
        } else {
          error.style.display = 'block';
          input.classList.add('shake');
          setTimeout(() => input.classList.remove('shake'), 500);
        }
      });

      input.addEventListener('input', () => { error.style.display = 'none'; });
    })();
  </script>
</body>
</html>
